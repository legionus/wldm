[daemon]
socket-path = /tmp/wldm/greeter.sock
state-dir = /tmp/wldm/state
log-path = /tmp/wldm/daemon.log

[greeter]
user = gdm
group = gdm
data-dir = ../data
locale-dir = ../locale
log-path = /tmp/wldm/greeter.log

[session]
execute = ../data/scripts/wayland-session

[dbus]
enabled = no
user = gdm

[keyboard]
rules = evdev
model = pc105
layout = us,ru
variant =
options = grp:alt_shift_toggle
