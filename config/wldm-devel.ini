[daemon]
socket-path = /tmp/wldm/greeter.sock
log-path = /tmp/wldm/daemon.log

[greeter]
user = gdm
group = gdm
data-dir = ../data
locale-dir = ../locale
state-dir = /tmp/wldm-state
log-path = /tmp/wldm/greeter.log

[session]
execute = ../data/scripts/wayland-session

[dbus]
enabled = yes
user = gdm
service = org.freedesktop.DisplayManager
log-path = /tmp/wldm/dbus-adapter.log

[keyboard]
rules = evdev
model = pc105
layout = us,ru
variant =
options = grp:alt_shift_toggle
