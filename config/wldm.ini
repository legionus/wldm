[daemon]
seat = seat0
socket-path = /run/wldm/greeter.sock
log-path =
poweroff-command = systemctl poweroff
reboot-command = systemctl reboot
suspend-command =
hibernate-command =

[greeter]
user = gdm
group = gdm
tty = 7
theme = default
session-dirs = /usr/share/wayland-sessions
user-session-dir = .local/share/wayland-sessions
command = cage -d -s -m last --
pam-service = system-login
max-restarts = 3
user-sessions = yes
log-path =

[session]
pam-service = login
execute = /usr/share/wldm/scripts/wayland-session
pre-execute =
post-execute =

[keyboard]
rules =
model =
layout =
variant =
options =
