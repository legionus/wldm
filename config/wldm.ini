[daemon]
seat = seat0
socket-path = /tmp/wldm/greeter.sock
log-path = /tmp/wldm/daemon.log
poweroff-command = systemctl poweroff
reboot-command = systemctl reboot
suspend-command =
hibernate-command =

[greeter]
user = gdm
group = gdm
tty = 7
theme = default
session-dirs = /usr/share/wayland-sessions
user-session-dir = .local/share/wayland-sessions
command = cage -d -s -m last --
pam-service = system-login
max-restarts = 3
user-sessions = yes
log-path = /tmp/wldm/greeter.log

[session]
pam-service = login
command = default
pre-command =
post-command =
